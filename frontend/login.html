<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Grow More</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="deal-popup-container" class="deal-popup-container">
      <div class="deal-popup-banner">
        <button class="popup-close" aria-label="Close deal banner">
          &times;
        </button>
        <div class="popup-content">
          <div class="popup-text">
            <p class="popup-label">🔥 LIMITED TIME OFFER 🔥</p>
            <p class="popup-description">
              Get <strong>Up to 40% OFF</strong> + extra
              <strong>10% OFF</strong> on 2+ items
            </p>
          </div>
          <div class="popup-timer">
            <div class="timer-label">Deal Ends In:</div>
            <div class="popup-countdown">00:00:00</div>
          </div>
          <a href="shop.html" class="popup-cta">Shop Now</a>
        </div>
      </div>
    </div>

    <main class="container page-hero">
      <section
        class="card"
        id="login-card"
        style="max-width: 560px; margin: 0 auto; padding: 1.2rem"
      >
        <h1>Login</h1>
        <p>Login once to continue checkout securely.</p>
        <div class="login-tabs">
          <button type="button" class="login-tab active" data-mode="google">
            Google
          </button>
          <button type="button" class="login-tab" data-mode="phone">
            Phone
          </button>
          <button type="button" class="login-tab" data-mode="manual">
            Email
          </button>
        </div>

        <div class="login-pane active" data-mode="google">
          <button id="google-login-btn" class="social-btn" type="button">
            Continue with Google
          </button>
        </div>

        <div class="login-pane" data-mode="phone">
          <form id="phone-login-form" class="form">
            <input
              id="phone-input"
              type="tel"
              placeholder="Phone Number"
              required
            />
            <button id="generate-otp-btn" class="social-btn" type="button">
              Generate 4-digit OTP
            </button>
            <input
              id="phone-otp-input"
              type="text"
              placeholder="Enter 4-digit OTP"
              pattern="\d{4}"
              maxlength="4"
              required
            />
            <p id="otp-hint" class="muted"></p>
            <button class="submit-btn" type="submit">Verify & Continue</button>
          </form>
        </div>

        <div class="login-pane" data-mode="manual">
          <form id="manual-login-form" class="form">
            <input type="email" placeholder="Email" required />
            <input type="password" placeholder="Password" required />
            <button class="submit-btn" type="submit">Login & Continue</button>
          </form>
        </div>
        <button
          id="login-back-btn"
          type="button"
          class="ghost-btn"
          style="margin-top: 0.8rem"
        >
          Back to Store
        </button>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
