<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Success | Grow More</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="deal-popup-container" class="deal-popup-container">
      <div class="deal-popup-banner">
        <button class="popup-close" aria-label="Close deal banner">
          &times;
        </button>
        <div class="popup-content">
          <div class="popup-text">
            <p class="popup-label">🔥 LIMITED TIME OFFER 🔥</p>
            <p class="popup-description">
              Get <strong>Up to 40% OFF</strong> + extra
              <strong>10% OFF</strong> on 2+ items
            </p>
          </div>
          <div class="popup-timer">
            <div class="timer-label">Deal Ends In:</div>
            <div class="popup-countdown">00:00:00</div>
          </div>
          <a href="shop.html" class="popup-cta">Shop Now</a>
        </div>
      </div>
    </div>

    <main class="container page-hero">
      <section
        class="card"
        style="
          padding: 2rem;
          max-width: 720px;
          margin: 0 auto;
          text-align: center;
        "
      >
        <h1>Order Placed Successfully</h1>
        <p>
          Your summer order is confirmed. A confirmation email is on the way.
        </p>
        <p class="price big">Order ID: GM-SUM-2026</p>
        <div class="product-actions success-actions" style="margin-top: 1rem">
          <a class="ghost-btn" href="shop.html">Continue Shopping</a>
          <a class="add-btn" href="index.html">Back To Home</a>
        </div>
      </section>
    </main>
  </body>
</html>
